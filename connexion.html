<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Parfumerie — Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo">La <span>Parfumerie</span></a>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="inscription.html" class="btn-nav">S'inscrire</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <div class="card-header">
        <h2>Connexion</h2>
        <div class="card-divider"></div>
        <p>Bon retour parmi nous.</p>
      </div>

      <!-- Message de retour -->
      <div id="msg" class="msg"></div>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" placeholder="exemple@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="Ton mot de passe" required>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          Se connecter
        </button>
      </form>

      <div class="card-footer">
        Pas encore membre ? <a href="inscription.html">Créer un compte</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
